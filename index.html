<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./css/style.css">
  <title>Frontend Mentor | Blog preview card</title>

   <style>
    .attribution {
      font-size: 11px;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>
</head>

<body class="d-grid justify-content-center align-items-center  min-vh-100">
  <div class="card w-30" style="width: 18rem;">
    <img class="m-2 rounded" src="./assets/images/illustration-article.svg" alt="Blog Image.">
    <div class="card-body">
      <span class="badge bg-warning text-dark">Learning</span>
      <p class="mt-2">Published <time>21 Dec 2023</time></p>

      <h5 class="card-title fw-bold">HTML & CSS foundations</h5>
      <p class="card-text">These languages are the backbone of every website, defining structure,
        content, and presentation.</p>
      <div>
        <img src="assets/images/image-avatar.webp" alt="Greg Hooper">
        <span class="author-name fw-bold">Greg Hooper</span>
      </div>
    </div>
  </div>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
    Coded by <a href="#">Shanu Priya</a>.
  </div>
</body>

</html>
