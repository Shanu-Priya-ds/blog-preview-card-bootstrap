<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Blog preview card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution {
      font-size: 11px;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>
</head>

<body class="bg-warning">
  <div class="card" style="width: 18rem;">
    <img class="m-2 rounded" src="./assets/images/illustration-article.svg" class="card-img-top" alt="Blog Image.">
    <div class="card-body">
      <div>Learning</div>
      <p>Published <time>21 Dec 2023</time></p>

      <h5 class="card-title">HTML & CSS foundations</h5>
      <p class="card-text">These languages are the backbone of every website, defining structure,
        content, and presentation.</p>
      <div>
        <img src="assets/images/image-avatar.webp" alt="Greg Hooper">
        <span class="author-name">Greg Hooper</span>
      </div>
      <!-- <a href="#" class="btn btn-primary">Go somewhere</a> -->
    </div>
  </div>
